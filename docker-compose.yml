services:
  trad-bot:
    build: .
    container_name: trad-bot-opencode
    volumes:
      - ./src:/app/src
      - ./clients:/app/clients
      - ./Solution:/app/Solution
      - ./conf_opencode:/app/conf_opencode_mount
    ports:
      - "5545:8080"
    stdin_open: true
    tty: true
    working_dir: /app/src
    command: bash -c "python /app/doc_server.py & exec bash"
